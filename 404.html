<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada — Prompt Maestro</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: #0e168c; color: #c8cde0; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px; }
    .wrap { max-width: 480px; }
    .code { font-family: 'Playfair Display', serif; font-size: clamp(4rem, 12vw, 7rem); color: rgba(255,255,255,0.08); font-weight: 700; line-height: 1; }
    h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: #e6e9f0; margin: 16px 0 12px; }
    p { font-size: 0.95rem; color: #919bbe; margin-bottom: 32px; line-height: 1.6; }
    a.btn { display: inline-block; background: rgba(255,255,255,0.1); color: #fff; padding: 12px 32px; border-radius: 8px; text-decoration: none; font-weight: 500; transition: background 0.2s; }
    a.btn:hover { background: rgba(255,255,255,0.18); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Página no encontrada</h1>
    <p>La página que buscas no existe o fue movida. Vuelve al inicio para encontrar lo que necesitas.</p>
    <a href="/" class="btn">Volver al inicio</a>
  </div>
</body>
</html>
